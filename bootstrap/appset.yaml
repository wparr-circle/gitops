apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: bootstrap
spec:
  generators:
    - matrix:
        generators:
          - git:
              repoURL: https://github.com/wparr-circle/gitops.git
              revision: HEAD
              directories:
                - path: bootstrap/*
          - merge:
              mergeKeys:
                - values.environment
                - values.component
              generators:
                - clusters:
                    selector:
                      matchLabels:
                        'component-{{path.basename}}-enabled': 'true'
                    values:
                      environment: '{{ metadata.labels.environment }}'
                      component: '{{path.basename}}'
                - git:
                    pathParamPrefix: sharedconfigfile
                    repoURL: https://github.com/wparr-circle/gitops.git
                    revision: HEAD
                    files:
                      - path: 'bootstrap/{{path.basename}}/config.yaml'
                    values:
                      component: '{{path.basename}}'
                - git:
                    pathParamPrefix: configfile
                    repoURL: https://github.com/wparr-circle/gitops.git
                    revision: HEAD
                    files:
                      - path: 'bootstrap/{{path.basename}}/**/config.yaml'
                    values:
                      environment: '{{configfile.path[2]}}'
  template:
    metadata:
      name: '{{values.environment}}-{{path.basename}}-{{name}}'
    spec:
      project: 'default'
      source:
        repoURL: '{{repoUrl}}'
        chart: '{{chart}}'
        targetRevision: '{{targetRevision}}'
        helm:
          version: v3
          releaseName: '{{path.basename}}'
      destination:
        server: '{{server}}'
        namespace: '{{path.basename}}'
